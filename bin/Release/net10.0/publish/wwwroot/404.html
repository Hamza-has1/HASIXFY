<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HASXIFY — Content Creator</title>
    <base href="/" />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function () { emailjs.init("uqbkNbGOB9sELAby1"); })();

        window.sendEmail = function (fromName, fromEmail, subjectText, messageText) {
            return emailjs.send("service_g3vr7bq", "template_fvz9jhc", {
                from_name: fromName,
                from_email: fromEmail,
                subject: subjectText,
                message: messageText
            }).then(function () { return true; }, function () { return false; });
        };

        var _themeMediaQuery = null;
        var _dotNetRef = null;

        window.detectDarkMode = function (dotnetRef) {
            _dotNetRef = dotnetRef;
            var saved = localStorage.getItem('hasxify-theme');
            var isDark = saved !== null ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
            _themeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            _themeMediaQuery.addEventListener('change', function (e) {
                if (!localStorage.getItem('hasxify-theme')) {
                    _dotNetRef.invokeMethodAsync('SetDarkMode', e.matches);
                }
            });
            return isDark;
        };

        window.saveThemePreference = function (isDark) {
            localStorage.setItem('hasxify-theme', isDark ? 'dark' : 'light');
        };

        window.removeThemeListener = function () {
            if (_themeMediaQuery && _dotNetRef) {
                _themeMediaQuery.removeEventListener('change', function () { });
            }
        };

        document.addEventListener('DOMContentLoaded', function () {
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry, i) {
                    if (entry.isIntersecting) {
                        setTimeout(function () { entry.target.classList.add('visible'); }, i * 100);
                    }
                });
            }, { threshold: 0.1 });

            function observeAll() {
                document.querySelectorAll('.reveal').forEach(function (el) { observer.observe(el); });
            }

            observeAll();
            var mo = new MutationObserver(observeAll);
            mo.observe(document.body, { childList: true, subtree: true });
        });
    </script>
</head>
<body>
    <div id="app">
        <div style="position:fixed; inset:0; background:#000000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;">
            <div style="font-family:'Orbitron',sans-serif; font-size:2.5rem; font-weight:900; color:#c084fc; letter-spacing:6px;">HASXIFY</div>
            <div style="width:60px; height:2px; background:linear-gradient(90deg,#7c3aed,#c084fc); margin-top:20px; border-radius:2px;"></div>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x2717;</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
